<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dugout IQ</title>
  <script>
    // GitHub Pages SPA redirect for client-side routing
    var path = window.location.pathname;
    var base = '/dugoutiq';
    if (path.startsWith(base) && (path.indexOf('/join/') > -1 || path.indexOf('/score/') > -1)) {
      var route = path.slice(base.length);
      window.location.replace(base + '/?route=' + encodeURIComponent(route));
    } else {
      window.location.replace(base + '/');
    }
  </script>
</head>
<body></body>
</html>
