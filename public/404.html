<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dugout IQ</title>
  <script>
    // GitHub Pages SPA redirect
    // Converts /dugoutiq/score/abc123 to /dugoutiq/?route=/score/abc123
    // Then index.html reads window.location and routes correctly
    var path = window.location.pathname;
    var base = '/dugoutiq';
    if (path.startsWith(base)) {
      var route = path.slice(base.length);
      window.location.replace(base + '/?route=' + encodeURIComponent(route));
    }
  </script>
</head>
<body></body>
</html>
