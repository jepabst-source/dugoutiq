<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dugout IQ</title>
  <script>
    // GitHub Pages SPA redirect for client-side routing
    var path = window.location.pathname;
    if (path.indexOf('/join/') > -1 || path.indexOf('/score/') > -1) {
      window.location.replace('/?route=' + encodeURIComponent(path));
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
